<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Поиск животных</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
    }

    #preview {
      width: 400px;
      height: 400px;
      border-radius: 12px;
      object-fit: cover;
      display: none;
    }

    #placeholder {
      width: 400px;
      height: 400px;
      border-radius: 12px;
      background: #1a1a1a;
      border: 2px dashed #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 14px;
    }

    #result {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      min-height: 40px;
      text-align: center;
    }

    #confidence {
      font-size: 14px;
      color: #888;
      text-align: center;
      min-height: 20px;
    }

    label {
      padding: 12px 28px;
      background: #fff;
      color: #111;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    label:hover { background: #ddd; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

  <div id="placeholder">Фото не выбрано</div>
  <img id="preview">

  <div id="result">—</div>
  <div id="confidence"></div>

  <label>
    📁 Выбрать фото
    <input type="file" accept="image/*" onchange="handleFile(event)">
  </label>

<script>
  const ANIMAL_KEYWORDS = [
    'cat','dog','bird','fish','horse','cow','sheep','pig','rabbit','hamster',
    'lion','tiger','bear','wolf','fox','deer','elephant','giraffe','zebra',
    'monkey','gorilla','panda','koala','kangaroo','crocodile','snake','lizard',
    'turtle','frog','eagle','owl','parrot','penguin','duck','chicken','shark',
    'whale','dolphin','seal','spider','bee','butterfly','squirrel','raccoon',
    'camel','llama','cheetah','leopard','jaguar','flamingo','peacock',
    'goldfish','octopus','gecko','chameleon','labrador','poodle','bulldog',
    'husky','retriever','terrier','beagle','tabby','kitten','puppy',
    'animal','wildlife','mammal','reptile','insect','Persian','Siamese',
    'hound','spaniel','shepherd','pomeranian','chihuahua','dachshund'
  ];

  function isAnimal(name) {
    return ANIMAL_KEYWORDS.some(kw => name.toLowerCase().includes(kw.toLowerCase()));
  }

  let net = null;

 
  mobilenet.load({ version: 2, alpha: 1.0 }).then(m => {
    net = m;
    console.log('Модель загружена');
  });

  async function handleFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    const preview = document.getElementById('preview');
    const placeholder = document.getElementById('placeholder');

    document.getElementById('result').textContent = 'Загрузка...';
    document.getElementById('confidence').textContent = '';

    
    await new Promise(resolve => {
      preview.onload = resolve;
      preview.src = URL.createObjectURL(file);
    });

    preview.style.display = 'block';
    placeholder.style.display = 'none';

    
    if (!net) {
      document.getElementById('result').textContent = 'Загрузка модели...';
      while (!net) await new Promise(r => setTimeout(r, 200));
    }

    document.getElementById('result').textContent = 'Анализирую...';

    const predictions = await net.classify(preview, 10);
    const animals = predictions.filter(p => isAnimal(p.className));

    if (animals.length === 0) {
      document.getElementById('result').textContent = 'Животное не найдено';
      document.getElementById('confidence').textContent = '';
    } else {
      const top = animals[0];
      document.getElementById('result').textContent = top.className.split(',')[0];
      document.getElementById('confidence').textContent = (top.probability * 100).toFixed(1) + '%';
    }
  }
</script>
</body>
</html>
